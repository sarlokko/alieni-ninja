name: Deploy online

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - '.github/workflows/gh-pages-branch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy public to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true

      - name: Verify online deploy
        run: |
          sleep 20
          curl -fsSL "https://cdn.jsdelivr.net/gh/sarlokko/alieni-ninja@gh-pages/js/game.js" | grep -q "aimJoy"
          echo "Online: https://cdn.jsdelivr.net/gh/sarlokko/alieni-ninja@gh-pages/game.html"
