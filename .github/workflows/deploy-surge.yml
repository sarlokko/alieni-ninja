name: Deploy Surge

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - '.github/workflows/deploy-surge.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install surge
        run: npm install -g surge

      - name: Check Surge credentials
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          if [ -z "$SURGE_LOGIN" ] || [ -z "$SURGE_TOKEN" ]; then
            echo "::error::Configura i secret SURGE_LOGIN e SURGE_TOKEN nel repository per pubblicare su surge.sh"
            exit 1
          fi

      - name: Deploy to surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: surge ./public https://alieni-ninja-game.surge.sh

      - name: Verify deploy
        run: |
          curl -fsSL "https://alieni-ninja-game.surge.sh/js/game.js" | grep -q "aimJoy"
